site_name: Plasma OES Spectral Analysis
site_description: Machine Learning pipeline for plasma optical emission spectroscopy
repo_url: https://github.com/your-org/libs-spectral-analysis

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: teal

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference:
      - Data Loader: api/data_loader.md
      - Preprocessing: api/preprocessing.md
      - Features: api/features.md
      - Spatial Analysis: api/spatial.md
      - Temporal Analysis: api/temporal.md
      - Evaluation: api/evaluation.md
      - Guardrail: api/guardrail.md
      - Models — Traditional: api/models_traditional.md
      - Models — Deep Learning: api/models_deep_learning.md
      - Models — Calibration: api/models_calibration.md
  - Model Cards:
      - Conv1D Regressor: model_cards/conv1d_regressor.md
      - LSTM Temporal: model_cards/lstm_temporal.md
